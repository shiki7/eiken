<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>えいけん4きゅう たんごカード</title>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #1a1a2e;
  --bg2: #16213e;
  --card-front: #0f3460;
  --card-back: #e94560;
  --accent: #f5a623;
  --green: #27ae60;
  --white: #ffffff;
  --soft: #f0f4ff;
  --text: #ffffff;
  --shadow: rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Kosugi Maru', sans-serif;
  background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, #0d1b2a 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--text);
  overflow-x: hidden;
}

/* 星のパーティクル背景 */
.stars-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.4); }
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 560px;
  padding: 16px 16px 80px;
}

/* ヘッダー */
header {
  text-align: center;
  padding: 20px 0 10px;
}
header h1 {
  font-size: clamp(1.4rem, 5vw, 2rem);
  color: var(--accent);
  text-shadow: 0 0 20px rgba(245,166,35,0.6);
  letter-spacing: 2px;
  margin-bottom: 4px;
}
header p {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.6);
}

/* カテゴリ選択 */
#homeScreen {}
.home-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  padding: 24px 20px;
  backdrop-filter: blur(10px);
  margin-bottom: 16px;
}
.home-card h2 {
  font-size: 1.1rem;
  color: var(--accent);
  margin-bottom: 16px;
  text-align: center;
}
.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.cat-btn {
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 14px 10px;
  font-family: inherit;
  color: white;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  font-size: 0.9rem;
}
.cat-btn .icon { font-size: 1.8rem; display: block; margin-bottom: 4px; }
.cat-btn .en-label { font-size: 0.65rem; color: rgba(255,255,255,0.4); display: block; }
.cat-btn:hover { background: rgba(245,166,35,0.2); border-color: var(--accent); }
.cat-btn.selected {
  background: rgba(245,166,35,0.25);
  border-color: var(--accent);
  box-shadow: 0 0 16px rgba(245,166,35,0.3);
}
.count-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 14px;
}
.count-btn {
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 8px 18px;
  font-family: inherit;
  color: white;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.2s;
}
.count-btn.selected { background: rgba(245,166,35,0.25); border-color: var(--accent); }

.btn-start {
  width: 100%;
  margin-top: 14px;
  padding: 16px;
  font-family: inherit;
  font-size: 1.2rem;
  background: linear-gradient(135deg, #e94560, #f5a623);
  color: white;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(233,69,96,0.4);
  transition: all 0.2s;
  letter-spacing: 1px;
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(233,69,96,0.5); }
.btn-start:disabled { opacity: 0.4; cursor: default; transform: none; }

/* ===== フラッシュカード画面 ===== */
#flashScreen { display: none; }

/* スコアバー */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.score-pill {
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 0.85rem;
  display: flex;
  gap: 14px;
}
.score-pill span { color: rgba(255,255,255,0.6); }
.score-pill b { color: var(--accent); }

.prog-wrap {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  margin: 0 12px;
  overflow: hidden;
}
.prog-bar {
  height: 100%;
  background: linear-gradient(90deg, #e94560, var(--accent));
  border-radius: 10px;
  transition: width 0.5s ease;
}

/* カテゴリ・番号表示 */
.card-meta {
  text-align: center;
  margin-bottom: 10px;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.45);
  display: flex;
  justify-content: center;
  gap: 12px;
}
.cat-tag {
  background: rgba(233,69,96,0.3);
  border: 1px solid rgba(233,69,96,0.5);
  border-radius: 10px;
  padding: 2px 12px;
  color: #ff8fa3;
}

/* ===== フリップカード ===== */
.flip-scene {
  width: 100%;
  perspective: 1200px;
  margin-bottom: 16px;
  cursor: pointer;
}
.flip-card {
  width: 100%;
  min-height: 300px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4,0.2,0.2,1);
  border-radius: 28px;
}
.flip-card.flipped { transform: rotateY(180deg); }

.flip-face {
  position: absolute;
  width: 100%; height: 100%;
  min-height: 300px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 24px;
}

/* 表面：英語 */
.face-front {
  background: linear-gradient(135deg, #0f3460 0%, #1a1a4e 100%);
  border: 2px solid rgba(100,120,255,0.3);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
}
.face-front .hint-tap {
  position: absolute;
  bottom: 18px;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.3);
  display: flex;
  align-items: center;
  gap: 4px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

.face-front .cat-tag-front {
  position: absolute;
  top: 18px; left: 18px;
  font-size: 0.7rem;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 3px 12px;
  color: rgba(255,255,255,0.5);
}

.en-word {
  font-size: clamp(2.2rem, 9vw, 3.5rem);
  font-weight: bold;
  color: white;
  text-align: center;
  letter-spacing: 2px;
  text-shadow: 0 0 30px rgba(100,120,255,0.5);
  margin-bottom: 8px;
  line-height: 1.2;
}
.en-phonetic {
  font-size: 1rem;
  color: rgba(255,255,255,0.4);
  margin-bottom: 0;
}

/* ？マーク装飾 */
.question-deco {
  position: absolute;
  font-size: 8rem;
  color: rgba(255,255,255,0.03);
  top: 10px; right: 20px;
  user-select: none;
  line-height: 1;
}

/* 裏面：ひらがな＋絵 */
.face-back {
  background: linear-gradient(135deg, #1a0a2e 0%, #3d0a1a 100%);
  border: 2px solid rgba(233,69,96,0.4);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  transform: rotateY(180deg);
}
.face-back .back-en {
  font-size: 1rem;
  color: rgba(255,255,255,0.4);
  margin-bottom: 6px;
}
.face-back .illust {
  font-size: clamp(3.5rem, 14vw, 6rem);
  margin-bottom: 10px;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4));
  animation: none;
}
.face-back.show-anim .illust { animation: popIn 0.4s cubic-bezier(0.3,1.5,0.5,1) 0.1s both; }
@keyframes popIn { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }

.face-back .ja-reading {
  font-size: clamp(1.8rem, 7vw, 2.6rem);
  color: #ff8fa3;
  text-shadow: 0 0 20px rgba(233,69,96,0.6);
  margin-bottom: 6px;
  text-align: center;
}
.face-back .ja-desc {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.5);
  text-align: center;
  line-height: 1.6;
  max-width: 260px;
}
.face-back .example-en {
  margin-top: 10px;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.35);
  font-style: italic;
}

/* 操作ボタン */
.action-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}
.action-btn {
  flex: 1;
  padding: 14px 8px;
  border: none;
  border-radius: 16px;
  font-family: inherit;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: bold;
}
.btn-ok {
  background: linear-gradient(135deg, #27ae60, #2ecc71);
  color: white;
  box-shadow: 0 4px 16px rgba(39,174,96,0.4);
}
.btn-ok:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(39,174,96,0.5); }
.btn-ng {
  background: linear-gradient(135deg, #c0392b, #e74c3c);
  color: white;
  box-shadow: 0 4px 16px rgba(231,76,60,0.4);
}
.btn-ng:hover { transform: translateY(-2px); }
.btn-skip {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6);
  border: 1px solid rgba(255,255,255,0.15);
  flex: 0 0 auto;
  padding: 14px 16px;
}

.action-row { display: none; }
.action-row.show { display: flex; animation: slideUp 0.3s ease; }

/* ナビボタン */
.nav-row {
  display: flex;
  gap: 10px;
  margin-top: 0;
}
.btn-nav {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 16px;
  font-family: inherit;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(255,255,255,0.08);
  color: white;
  border: 1px solid rgba(255,255,255,0.15);
}
.btn-nav:hover { background: rgba(255,255,255,0.15); }
.btn-nav.primary {
  background: linear-gradient(135deg, #e94560, #f5a623);
  border: none;
  box-shadow: 0 4px 16px rgba(233,69,96,0.4);
  font-weight: bold;
}
.btn-nav.primary:hover { transform: translateY(-2px); }

/* 覚えた / まだ バッジ */
.know-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 10px;
}
.know-badge.ok { background: rgba(39,174,96,0.2); color: #7dff9e; border: 1px solid rgba(39,174,96,0.4); }
.know-badge.ng { background: rgba(233,69,96,0.2); color: #ff8fa3; border: 1px solid rgba(233,69,96,0.4); }
.know-badge.none { display: none; }

/* ===== 結果画面 ===== */
#resultScreen {
  display: none;
  text-align: center;
  animation: slideUp 0.5s ease;
}
.result-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 28px;
  padding: 32px 24px;
  backdrop-filter: blur(10px);
  margin-bottom: 16px;
}
.result-emoji { font-size: 5rem; animation: bounce 0.8s ease infinite alternate; margin-bottom: 10px; }
@keyframes bounce { to { transform: translateY(-12px); } }
.result-score { font-size: 4rem; font-weight: bold; color: var(--accent); text-shadow: 0 0 30px rgba(245,166,35,0.5); }
.result-total { font-size: 1.2rem; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
.result-msg { font-size: 1.3rem; color: white; margin: 12px 0 20px; }
.stars { font-size: 2.2rem; margin-bottom: 16px; }

.result-list-title { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-bottom: 10px; }
.result-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
.result-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 8px 14px;
  font-size: 0.9rem;
  text-align: left;
}
.result-item .ri-icon { font-size: 1.4rem; }
.result-item .ri-en { color: white; font-weight: bold; min-width: 90px; }
.result-item .ri-ja { color: rgba(255,255,255,0.5); }
.result-item.ri-ok { border-left: 3px solid var(--green); }
.result-item.ri-ng { border-left: 3px solid #e94560; }

.retry-btns { display: flex; gap: 10px; margin-top: 10px; }
.btn-retry {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 16px;
  font-family: inherit;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: bold;
}
.btn-retry:hover { transform: translateY(-2px); }
.btn-r1 { background: linear-gradient(135deg, #8e44ad, #9b59b6); color: white; box-shadow: 0 4px 16px rgba(142,68,173,0.4); }
.btn-r2 { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; box-shadow: 0 4px 16px rgba(39,174,96,0.4); }

/* 共通 */
@keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- 星背景 -->
<div class="stars-bg" id="starsContainer"></div>

<div class="container">
  <header>
    <h1>✨ えいけん4きゅう ✨</h1>
    <p>たんごフラッシュカード</p>
  </header>

  <!-- ホーム -->
  <div id="homeScreen">
    <div class="home-card">
      <h2>📂 カテゴリをえらぼう</h2>
      <div class="cat-grid" id="catGrid"></div>
    </div>
    <div class="home-card">
      <h2>🔢 なんまいにする？</h2>
      <div class="count-row">
        <button class="count-btn" onclick="setCount(10,this)">10まい</button>
        <button class="count-btn selected" onclick="setCount(20,this)">20まい</button>
        <button class="count-btn" onclick="setCount(30,this)">30まい</button>
      </div>
    </div>
    <button class="btn-start" id="startBtn" onclick="startFlash()" disabled>
      🚀 スタート！
    </button>
  </div>

  <!-- フラッシュ -->
  <div id="flashScreen">
    <div class="topbar">
      <div class="score-pill">
        <span>おぼえた <b id="okCount">0</b></span>
        <span>まだ <b id="ngCount">0</b></span>
      </div>
      <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
      <div style="font-size:0.8rem;color:rgba(255,255,255,0.4)" id="cardNumDisp">1/20</div>
    </div>

    <div class="card-meta">
      <span class="cat-tag" id="catLabel"></span>
      <span id="cardNumLabel"></span>
    </div>

    <div class="flip-scene" id="flipScene" onclick="flipCard()">
      <div class="flip-card" id="flipCard">
        <!-- 表：英語 -->
        <div class="flip-face face-front">
          <div class="question-deco">？</div>
          <span class="cat-tag-front" id="frontCatTag"></span>
          <div class="en-word" id="enWord"></div>
          <div class="en-phonetic" id="enPhonetic"></div>
          <div class="hint-tap">👆 タップして こたえを みる</div>
        </div>
        <!-- 裏：ひらがな＋絵 -->
        <div class="flip-face face-back" id="faceBack">
          <div class="back-en" id="backEn"></div>
          <div class="illust" id="cardIllust"></div>
          <div class="ja-reading" id="jaReading"></div>
          <div class="ja-desc" id="jaDesc"></div>
          <div class="example-en" id="exampleEn"></div>
        </div>
      </div>
    </div>

    <!-- 覚えた？ボタン（めくった後に表示） -->
    <div class="action-row" id="actionRow">
      <button class="action-btn btn-ok" onclick="markCard(true)">✅ おぼえた！</button>
      <button class="action-btn btn-ng" onclick="markCard(false)">❌ もういちど</button>
    </div>

    <div class="nav-row">
      <button class="btn-nav" onclick="prevCard()">← まえ</button>
      <button class="btn-nav primary" id="nextCardBtn" onclick="nextCard()">つぎ →</button>
    </div>
  </div>

  <!-- けっか -->
  <div id="resultScreen">
    <div class="result-card">
      <div class="result-emoji" id="resEmoji">🎉</div>
      <div class="result-score" id="resScore">0</div>
      <div class="result-total" id="resTotal">/ 20まい</div>
      <div class="stars" id="resStars"></div>
      <div class="result-msg" id="resMsg"></div>

      <div class="result-list-title">📋 このセッションのたんご</div>
      <div class="result-list" id="resultList"></div>
    </div>
    <div class="retry-btns">
      <button class="btn-retry btn-r1" onclick="retryNg()">❌ まちがいだけ もういちど</button>
      <button class="btn-retry btn-r2" onclick="goHome()">🏠 ホームへ</button>
    </div>
  </div>
</div>

<script>
// ====================================================
// データ：英検4級レベル単語（絵文字・ひらがな・説明付き）
// ====================================================
const WORDS = [
  // 自然・天気
  { cat:'しぜん', en:'mountain', phonetic:'/ˈmaʊntən/', illust:'🏔️', ja:'やま', desc:'たかくて おおきな やま', ex:'Let\'s climb the mountain.' },
  { cat:'しぜん', en:'river', phonetic:'/ˈrɪvər/', illust:'🏞️', ja:'かわ', desc:'ながれる みず のこと', ex:'The river is wide.' },
  { cat:'しぜん', en:'forest', phonetic:'/ˈfɔːrɪst/', illust:'🌲', ja:'もり', desc:'きがたくさん はえている ところ', ex:'A fox lives in the forest.' },
  { cat:'しぜん', en:'ocean', phonetic:'/ˈoʊʃən/', illust:'🌊', ja:'うみ（たいよう）', desc:'とても ひろい うみ', ex:'Whales live in the ocean.' },
  { cat:'しぜん', en:'sky', phonetic:'/skaɪ/', illust:'🌤️', ja:'そら', desc:'うえを みると ある そら', ex:'The sky is blue today.' },
  { cat:'しぜん', en:'cloud', phonetic:'/klaʊd/', illust:'☁️', ja:'くも', desc:'そらに うかぶ しろい くも', ex:'Dark clouds are coming.' },
  { cat:'しぜん', en:'rain', phonetic:'/reɪn/', illust:'🌧️', ja:'あめ', desc:'そらから おちてくる みず', ex:'It will rain tomorrow.' },
  { cat:'しぜん', en:'snow', phonetic:'/snoʊ/', illust:'❄️', ja:'ゆき', desc:'ふゆに そらから ふってくる しろいもの', ex:'Snow falls in winter.' },
  { cat:'しぜん', en:'wind', phonetic:'/wɪnd/', illust:'💨', ja:'かぜ', desc:'ふいてくる かぜ', ex:'The wind is strong today.' },
  { cat:'しぜん', en:'flower', phonetic:'/ˈflaʊər/', illust:'🌸', ja:'はな', desc:'きれいな いろの はな', ex:'This flower is beautiful.' },
  { cat:'しぜん', en:'tree', phonetic:'/triː/', illust:'🌳', ja:'き', desc:'だいちに はえる おおきな き', ex:'A bird is in the tree.' },
  { cat:'しぜん', en:'lake', phonetic:'/leɪk/', illust:'🏊', ja:'みずうみ', desc:'りくに かこまれた みず', ex:'We swam in the lake.' },

  // 食べ物・飲み物
  { cat:'たべもの', en:'breakfast', phonetic:'/ˈbrekfəst/', illust:'🍳', ja:'あさごはん', desc:'あさ たべる しょくじ', ex:'I eat breakfast at 7.' },
  { cat:'たべもの', en:'lunch', phonetic:'/lʌntʃ/', illust:'🍱', ja:'ひるごはん', desc:'ひるに たべる しょくじ', ex:'Let\'s have lunch together.' },
  { cat:'たべもの', en:'dinner', phonetic:'/ˈdɪnər/', illust:'🍽️', ja:'ばんごはん', desc:'よる たべる しょくじ', ex:'Dinner is at 6 o\'clock.' },
  { cat:'たべもの', en:'rice', phonetic:'/raɪs/', illust:'🍚', ja:'ごはん・こめ', desc:'にほんの たいせつな しょくじ', ex:'I like rice very much.' },

// ====================================================
// カテゴリ一覧を抽出
// ====================================================
const CATS_META = {
  'しぜん':    { icon:'🌿', en:'nature' },
  'たべもの':  { icon:'🍔', en:'food' },
  'がっこう':  { icon:'✏️', en:'school' },
  'スポーツ':  { icon:'⚽', en:'sports/hobby' },
  'ばしょ':    { icon:'📍', en:'places' },
  'からだ':    { icon:'💪', en:'health' },
  'けいようし':{ icon:'💬', en:'adjectives' },
  'どうし':    { icon:'🏃', en:'verbs' },
};

// ====================================================
// 状態
// ====================================================
let selectedCats = [];
let cardCount = 20;
let deck = [];
let current = 0;
let isFlipped = false;
let results = []; // {word, ok: bool}

// ====================================================
// 初期化
// ====================================================
window.onload = () => {
  // 星を生成
  const sc = document.getElementById('starsContainer');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
    sc.appendChild(s);
  }
  buildCatGrid();
};

function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  Object.entries(CATS_META).forEach(([cat, meta]) => {
    const count = WORDS.filter(w => w.cat === cat).length;
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.innerHTML = `<span class="icon">${meta.icon}</span>${cat}<span class="en-label">${meta.en} / ${count}たんご</span>`;
    btn.onclick = () => toggleCat(btn, cat);
    grid.appendChild(btn);
  });
}

function toggleCat(btn, cat) {
  if (btn.classList.contains('selected')) {
    btn.classList.remove('selected');
    selectedCats = selectedCats.filter(c => c !== cat);
  } else {
    btn.classList.add('selected');
    selectedCats.push(cat);
  }
  document.getElementById('startBtn').disabled = selectedCats.length === 0;
}

function setCount(n, btn) {
  cardCount = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ====================================================
// フラッシュ開始
// ====================================================
function startFlash() {
  const pool = WORDS.filter(w => selectedCats.includes(w.cat));
  deck = shuffle([...pool]).slice(0, Math.min(cardCount, pool.length));
  current = 0;
  results = deck.map(w => ({ word: w, ok: null }));
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('flashScreen').style.display = 'block';
  showCard(true);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ====================================================
// カード表示
// ====================================================
function showCard(instant) {
  const w = deck[current];
  isFlipped = false;

  const fc = document.getElementById('flipCard');
  const fb = document.getElementById('faceBack');

  function applyContent() {
    // 表面
    document.getElementById('enWord').textContent = w.en;
    document.getElementById('enPhonetic').textContent = w.phonetic;
    document.getElementById('frontCatTag').textContent = w.cat;
    document.getElementById('catLabel').textContent = w.cat;

    // 裏面
    document.getElementById('backEn').textContent = w.en;
    document.getElementById('cardIllust').textContent = w.illust;
    document.getElementById('jaReading').textContent = w.ja;
    document.getElementById('jaDesc').textContent = w.desc;
    document.getElementById('exampleEn').textContent = w.ex;

    fb.classList.remove('show-anim');
    document.getElementById('actionRow').classList.remove('show');

    // スコア・進捗
    const okN = results.filter(r => r.ok === true).length;
    const ngN = results.filter(r => r.ok === false).length;
    document.getElementById('okCount').textContent = okN;
    document.getElementById('ngCount').textContent = ngN;
    document.getElementById('cardNumDisp').textContent = `${current+1}/${deck.length}`;
    document.getElementById('cardNumLabel').textContent = `${current+1} まい め / ${deck.length}まい`;
    document.getElementById('progBar').style.width = `${(current / deck.length) * 100}%`;

    // 次へボタン
    document.getElementById('nextCardBtn').textContent =
      current < deck.length - 1 ? 'つぎ →' : '🎉 けっかをみる！';
  }

  if (instant || !fc.classList.contains('flipped')) {
    // すでに表向き（または即時）→ そのままコンテンツ差し替え
    fc.classList.remove('flipped');
    applyContent();
  } else {
    // めくれた状態 → まず表に戻してからコンテンツ差し替え
    // transitionを一時的に無効化して即座に表に戻す
    fc.style.transition = 'none';
    fc.classList.remove('flipped');
    // 1フレーム待ってtransitionを戻し、内容を更新
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        fc.style.transition = '';
        applyContent();
      });
    });
  }
}

function flipCard() {
  if (isFlipped) return;
  isFlipped = true;
  const fc = document.getElementById('flipCard');
  const fb = document.getElementById('faceBack');
  fc.classList.add('flipped');
  setTimeout(() => {
    fb.classList.add('show-anim');
    document.getElementById('actionRow').classList.add('show');
  }, 350);
}

function markCard(ok) {
  results[current].ok = ok;
  nextCard();
}

function nextCard() {
  current++;
  if (current >= deck.length) {
    showResult();
  } else {
    showCard();
  }
}

function prevCard() {
  if (current > 0) {
    current--;
    showCard();
  }
}

// ====================================================
// 結果
// ====================================================
function showResult() {
  document.getElementById('flashScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';
  document.getElementById('progBar').style.width = '100%';

  const total = deck.length;
  const okN = results.filter(r => r.ok === true).length;
  const pct = okN / total;

  document.getElementById('resScore').textContent = okN;
  document.getElementById('resTotal').textContent = `/ ${total}まい おぼえた`;

  let emoji, stars, msg;
  if (pct >= 0.9) {
    emoji = '🏆'; stars = '⭐⭐⭐'; msg = 'かんぺき！えいごの てんさい！🎊';
  } else if (pct >= 0.7) {
    emoji = '🌟'; stars = '⭐⭐'; msg = 'すごい！よくおぼえてたね！';
  } else if (pct >= 0.5) {
    emoji = '💪'; stars = '⭐'; msg = 'がんばったね！もうすこしで かんぺき！';
  } else {
    emoji = '🌱'; stars = '🔥'; msg = 'まちがえた ところを もう いちど！';
  }
  document.getElementById('resEmoji').textContent = emoji;
  document.getElementById('resStars').textContent = stars;
  document.getElementById('resMsg').textContent = msg;

  // リスト
  const list = document.getElementById('resultList');
  list.innerHTML = '';
  results.forEach(r => {
    const w = r.word;
    const div = document.createElement('div');
    const status = r.ok === true ? 'ri-ok' : r.ok === false ? 'ri-ng' : '';
    const badge = r.ok === true ? '✅' : r.ok === false ? '❌' : '－';
    div.className = `result-item ${status}`;
    div.innerHTML = `
      <span class="ri-icon">${w.illust}</span>
      <span class="ri-en">${badge} ${w.en}</span>
      <span class="ri-ja">${w.ja}</span>
    `;
    list.appendChild(div);
  });

  // まちがいのみ再挑戦ボタン
  const ngList = results.filter(r => r.ok === false).map(r => r.word);
  const retryBtn = document.querySelector('.btn-r1');
  retryBtn.disabled = ngList.length === 0;
  retryBtn.style.opacity = ngList.length === 0 ? '0.4' : '1';
}

function retryNg() {
  const ngWords = results.filter(r => r.ok === false).map(r => r.word);
  if (ngWords.length === 0) return;
  deck = shuffle([...ngWords]);
  current = 0;
  results = deck.map(w => ({ word: w, ok: null }));
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('flashScreen').style.display = 'block';
  showCard(true);
}

function goHome() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('flashScreen').style.display = 'none';
  document.getElementById('homeScreen').classList.remove('hidden');
}
</script>
